<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>簽約完成</title>
<style>
/* 滿版設定 */
html, body {
    height: 100%;
    margin: 0;
    font-family: "Noto Sans TC", Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
    overflow: hidden;
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.05);
    padding: 60px 40px;
    border-radius: 20px;
    box-shadow: 0 10px 50px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease-out;
    max-width: 600px;
    width: 90%;
}

h1 {
    font-size: 48px;
    margin-bottom: 20px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
}

p {
    font-size: 20px;
    margin-bottom: 40px;
}

/* 下載按鈕 */
.download-btn {
    padding: 14px 28px;
    font-size: 18px;
    background: linear-gradient(45deg, #0066cc, #00ccff);
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
}

.download-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

/* 淡入動畫 */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px);}
    to { opacity: 1; transform: translateY(0);}
}

/* ---------- 手機版 ---------- */
@media screen and (max-width: 768px) {
    .container {
        padding: 40px 20px;
    }
    h1 {
        font-size: 32px;
    }
    p {
        font-size: 16px;
    }
    .download-btn {
        font-size: 16px;
        padding: 12px 24px;
    }
}
</style>
</head>
<body>
<div class="container">
    <h1>✅ 簽約完成！</h1>
    <p>感謝您的簽署，將盡速為您送件。</p>
    <a id="downloadBtn" class="download-btn" href="#">📄 下載 PDF</a>
</div>

<script>
// 取得 query string 的 file 參數
function getQueryParam(param) {
    const params = new URLSearchParams(window.location.search);
    return params.get(param);
}

const file = getQueryParam("file");
const btn = document.getElementById("downloadBtn");

if(file){
    btn.href = `/sign_data/${file}`;
    btn.download = file;
} else {
    // 如果沒有 file，就隱藏按鈕
    btn.style.display = "none";
}
</script>
</body>
</html>
