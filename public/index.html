<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>貸款委任契約書</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>

body {
    font-family: "Noto Sans TC", Arial;
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

/* 外框 */
.container {
    max-width: 650px;
    margin: 50px auto;
    background: white;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    position: relative;
}

.header {
    position: relative;
    width: 100%;
    text-align: center;
    margin-bottom: 40px;
    margin-top: -10px;
}

.logo {
    position: absolute;
    left: -30px;
    top: -10px;
    height: 120px;
    width: auto;
}

.title {
    font-size: 48px;
    font-weight: bold;
    color: #003366;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    background: linear-gradient(90deg, #003366, #0066cc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
    margin: 0 auto;
    padding: 10px 0;
}

/* 輸入框 */
input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* 合約 */
.contract-box {
    border: 1px solid #ddd;
    padding: 18px;
    height: 260px;
    overflow-y: auto;
    background: #fafafa;
    border-radius: 10px;
    line-height: 1.8;
    font-size: 14px;
    margin-top: 10px;
}

/* 同意區 */
.agree-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0;
    font-size: 14px;
}

.agree-row input {
    width: 20px;
    height: 20px;
}

/* 簽名 */
canvas {
    border: 2px dashed #999;
    border-radius: 10px;
    width: 100%;
    background: #fff;
}

.sign-title {
    margin-top: 15px;
    font-weight: bold;
}

/* 按鈕 */
.clear-btn {
    margin-top: 8px;
    background: #888;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

.submit-btn {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(45deg, #000, #444);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

.submit-btn:hover {
    opacity: 0.9;
}

/* Loading Overlay */
#loadingOverlay {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
    text-align: center;
}

#loadingOverlay .spinner-container {
    position: absolute;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%);
    color:white;
    font-size:18px;
    display:flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.spinner {
    border: 6px solid rgba(255,255,255,0.3);
    border-top: 6px solid #fff;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(360deg);}
}

/* 手機版 */
@media screen and (max-width: 768px) {
    .logo {
        left: 10px;
        top: -20px;
        height: 100px;
    }

    .title {
        font-size: 32px;
        padding: 5px 0;
    }

    .header {
        margin-top: -5px;
        margin-bottom: 20px;
    }
}
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loadingOverlay">
    <div class="spinner-container">
        <div class="spinner"></div>
        <div>請稍後，正在處理中...</div>
    </div>
</div>

<div class="container">

<!-- 標題 -->
<div class="header">
    <img src="logo.png" class="logo">
    <div class="title">貸 款 委 任 契 約 書</div>
</div>

<!-- 輸入欄位 -->
<input id="name" placeholder="姓名" oninput="updateContract()">
<input id="id" placeholder="身分證字號">
<input id="phone" placeholder="電話">
<input id="address" placeholder="地址">

<select id="percent" onchange="updateContract()">
    <option value="10">顧問費 10%</option>
    <option value="15" selected>顧問費 15%</option>
    <option value="20">顧問費 20%</option>
    <option value="25">顧問費 25%</option>
    <option value="30">顧問費 30%</option>
</select>

<select id="consultFee" onchange="updateContract()">
    <option value="3500">諮詢費 3,500</option>
    <option value="6000">諮詢費 6,000</option>
</select>

<input id="remaining" placeholder="尚未收齊差額" oninput="updateContract()">

<!-- 條款區 -->
<div class="contract-box" id="contractBox"></div>

<div class="agree-row">
    <input type="checkbox" id="agree">
    <label>我已閱讀並同意以上所有條款</label>
</div>

<div class="sign-title">簽名</div>
<canvas id="sign" width="500" height="200"></canvas>
<button class="clear-btn" onclick="clearCanvas()">清除簽名</button>

<button class="submit-btn" onclick="submitForm()">確認簽約</button>

</div>

<script>
let canvas = document.getElementById("sign");
let ctx = canvas.getContext("2d");
let drawing = false;

// 簽名比例計算
function getCanvasCoords(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let clientX, clientY;
    if(e.touches){ clientX=e.touches[0].clientX; clientY=e.touches[0].clientY; }
    else { clientX=e.clientX; clientY=e.clientY; }
    const x=(clientX-rect.left)*scaleX;
    const y=(clientY-rect.top)*scaleY;
    return {x,y};
}

canvas.addEventListener("mousedown",(e)=>{drawing=true; const {x,y}=getCanvasCoords(e); ctx.moveTo(x,y);});
canvas.addEventListener("mousemove",(e)=>{if(!drawing) return; const {x,y}=getCanvasCoords(e); ctx.lineWidth=2; ctx.lineCap="round"; ctx.lineTo(x,y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x,y);});
canvas.addEventListener("mouseup",()=>{drawing=false; ctx.beginPath();});
canvas.addEventListener("mouseleave",()=>{drawing=false; ctx.beginPath();});

canvas.addEventListener("touchstart",(e)=>{e.preventDefault(); drawing=true; const {x,y}=getCanvasCoords(e); ctx.moveTo(x,y);});
canvas.addEventListener("touchmove",(e)=>{e.preventDefault(); if(!drawing) return; const {x,y}=getCanvasCoords(e); ctx.lineWidth=2; ctx.lineCap="round"; ctx.lineTo(x,y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x,y);});
canvas.addEventListener("touchend",(e)=>{e.preventDefault(); drawing=false; ctx.beginPath();});

// 清除簽名
function clearCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height);}

// 動態更新條款
function updateContract(){
    const name = document.getElementById("name").value || "________";
    const percent = document.getElementById("percent").value;
    const fee = document.getElementById("consultFee").value;
    const remaining = document.getElementById("remaining").value || "0";

    document.getElementById("contractBox").innerHTML = `
    甲方：將御線上理財平臺<br>
    乙方：${name}<br><br>
    一、委任期間：自簽約日起三十日止，經雙方書面同意得延展。<br><br>
    二、報酬：約定於撥款後，扣除銀行或融資機構內扣費用後，
    依核准金額之 <b>${percent}%</b> 支付乙方顧問服務費，
    另付諮詢作業費新台幣 <b>${fee}</b> 元整，
    尚未收齊差額為 <b>${remaining}</b> 元。<br><br>
    三、違約：違約金50,000元，仍須支付服務費。<br><br>
    四、文件與保密：資料需真實，並負保密責任。<br><br>
    五、聯徵查詢：同意查詢信用資料。<br><br>
    六、契約變更終止：須書面同意。<br><br>
    七、簽署方式：通訊簽署等同親簽。
    `;
}

// 頁面載入時先更新一次
updateContract();

// 提交表單
async function submitForm(){
    if(!document.getElementById("agree").checked){ alert("請先同意條款"); return; }
    if(canvas.toDataURL().length < 5000){ alert("請簽名"); return; }

    document.getElementById("loadingOverlay").style.display="block";

    let data={
        name:document.getElementById("name").value,
        id:document.getElementById("id").value,
        phone:document.getElementById("phone").value,
        address:document.getElementById("address").value,
        percent:document.getElementById("percent").value,
        consultFee:document.getElementById("consultFee").value,
        remaining:document.getElementById("remaining").value,
        signature:canvas.toDataURL(),
        time:new Date().toLocaleString(),
        ip:"127.0.0.1"
    };

    try{
        const resp=await fetch("/sign",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        });
        const result=await resp.json();
        if(resp.ok && result.ok){
            const a=document.createElement("a");
            a.href="/sign_data/"+result.file;
            a.download=result.file;
            a.click();

            window.location.href="success.html";
        } else {
            alert("❌ 簽約失敗，請稍後再試");
        }
    } catch(err){
        console.error(err);
        alert("❌ 簽約失敗，請稍後再試");
    } finally{
        document.getElementById("loadingOverlay").style.display="none";
    }
}
</script>

</body>
</html>
